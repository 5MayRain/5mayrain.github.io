gs-list" itemprop="keywords"><li class="post-tags-list-item"><a class="post-tags-list-link" href="/tags/GitHub/" rel="tag">GitHub</a></li><li class="post-tags-list-item"><a class="post-tags-list-link" href="/tags/%E6%95%99%E7%A8%8B/" rel="tag">教程</a></li></ul></div></div></div><div class="article"><div class="main"><div class="content markdown" style="margin-top:0"><h3 id="开始"><a href="#开始" class="headerlink" title="开始"></a>开始</h3><p>在 GitHub 的项目路径下，打开 <code>Git Bash</code> 窗口，运行下列代码。</p><figure class="shiki bash"><div class="codeblock"><div class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></div><div class="code"><pre class="shiki github-light"><code><span class="line"><span style="color:#6a737d"># 尝试运行</span></span>
<span class="line"><span style="color:#6f42c1">git</span><span style="color:#24292e"> </span><span style="color:#032f62">checkout</span><span style="color:#24292e"> </span><span style="color:#005cc5">--orphan</span><span style="color:#24292e"> </span><span style="color:#032f62">latest_branch</span></span>
<span class="line"><span style="color:#6a737d"># 添加所有文件</span></span>
<span class="line"><span style="color:#6f42c1">git</span><span style="color:#24292e"> </span><span style="color:#032f62">add</span><span style="color:#24292e"> </span><span style="color:#005cc5">-A</span></span>
<span class="line"><span style="color:#6a737d"># 提交更改</span></span>
<span class="line"><span style="color:#6f42c1">git</span><span style="color:#24292e"> </span><span style="color:#032f62">commit</span><span style="color:#24292e"> </span><span style="color:#005cc5">-am</span><span style="color:#24292e"> </span><span style="color:#032f62">&quot;commit message&quot;</span></span>
<span class="line"><span style="color:#6a737d"># 删除分支</span></span>
<span class="line"><span style="color:#6f42c1">git</span><span style="color:#24292e"> </span><span style="color:#032f62">branch</span><span style="color:#24292e"> </span><span style="color:#005cc5">-D</span><span style="color:#24292e"> </span><span style="color:#032f62">master</span></span>
<span class="line"><span style="color:#6a737d"># 将当前分支重命名</span></span>
<span class="line"><span style="color:#6f42c1">git</span><span style="color:#24292e"> </span><span style="color:#032f62">branch</span><span style="color:#24292e"> </span><span style="color:#005cc5">-m</span><span style="color:#24292e"> </span><span style="color:#032f62">master</span></span>
<span class="line"><span style="color:#6a737d"># 强制更新存储库</span></span>
<span class="line"><span style="color:#6f42c1">git</span><span style="color:#24292e"> </span><span style="color:#032f62">push</span><span style="color:#24292e"> </span><span style="color:#005cc5">-f</span><span style="color:#24292e"> </span><span style="color:#032f62">origin</span><span style="color:#24292e"> </span><span style="color:#032f62">master</span></span></code></pre></div></div></figure><!--[if lt IE 9]><script>document.createElement('audio');</script><![endif]--><audio id="audio" loop preload="auto" controls data-autoplay="false"><source type="audio/mpeg" src=""></audio><ul id="audio-list" style="display:none"></ul></div><div class="statement"><div><span>作者:</span> 棕果核</div><div><span>标题:</span> GitHub 删除所有提交记录</div><div><span>链接:</span> <a href="/posts/802b0d9b/">https://mrzgh.top/posts/802b0d9b/</a></div><div><span>版权声明:</span> 本文采用 <a target="_blank" rel="noopener" href="https://creativecommons.org/licenses/by/4.0/deed.zh">CC BY 4.0</a> 进行声明</div></div><p class="end">-&nbsp;&nbsp;&nbsp;END&nbsp;&nbsp;&nbsp;-</p><div id="gitalk-container" class="comment link" data-enable="false" data-ae="false" data-ci="" data-cs="" data-r="" data-o="" data-a="" data-d="false">查看评论</div></div><div class="float"><div class="directory"><div class="directory_btn float_btn"></div><div class="directory_list"><ol class="toc"><li class="toc-item toc-level-3"><a class="toc-link" href="#%E5%BC%80%E5%A7%8B"><span class="toc-number">1.</span> <span class="toc-text">开始</span></a></li></ol></div></div></div></div></div></div><script src="https://cdn.jsdelivr.net/npm/hexo-shiki-plugin@latest/lib/codeblock.js"></script><script>const CODE_CONFIG={beautify:!0,highlightCopy:!0,highlightLang:!0,highlightHeightLimit:360,isHighlightShrink:!1,copy:{success:"复制成功",error:"复制失败",noSupport:"浏览器不支持"}};console.log("%c hexo-shiki-plugin %c v1.0.27 %c https://github.com/nova1751/hexo-shiki-plugin","color: #fff; background: #5f5f5f","color: #fff; background: #80c8f8","")</script></body><script src="/
